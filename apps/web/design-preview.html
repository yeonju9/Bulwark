<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Winterforge — 디자인 시안 10종</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=Hahmlet:wght@500;700&family=IBM+Plex+Sans+KR:wght@400;600&family=Jua&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@500;700&family=Song+Myung&display=swap" rel="stylesheet" />
<style>
  /* ───── 쇼케이스 공통 ───── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #222; color: #eee; font-family: 'Noto Sans KR', sans-serif; padding: 40px 16px; }
  .intro { max-width: 920px; margin: 0 auto 36px; }
  .intro h1 { font-size: 22px; margin-bottom: 8px; }
  .intro p { color: #aaa; font-size: 14px; line-height: 1.6; }
  .showcase { max-width: 920px; margin: 0 auto 56px; }
  .showcase > h2 { font-size: 17px; margin-bottom: 4px; color: #fff; }
  .showcase > p { font-size: 13px; color: #999; margin-bottom: 14px; }

  /* 목업 공통 구조 (테마가 전부 오버라이드) */
  .mock { border-radius: 8px; overflow: hidden; }
  .mock .bar { display: flex; align-items: center; gap: 14px; padding: 10px 16px; font-size: 14px; }
  .mock .bar .title { font-weight: 700; font-size: 16px; }
  .mock .bar .sp { flex: 1; }
  .mock .cols { display: flex; min-height: 270px; }
  .mock nav { width: 150px; padding: 10px 8px; display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .mock nav .nv { padding: 8px 10px; font-size: 13px; cursor: pointer; }
  .mock main { flex: 1; padding: 16px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .mock .card { width: 168px; padding: 14px 12px; text-align: center; font-size: 13px; }
  .mock .card .ic { font-size: 26px; margin-bottom: 6px; }
  .mock .card .nm { font-weight: 700; margin-bottom: 3px; }
  .mock .card .mt { font-size: 11.5px; opacity: 0.75; margin-bottom: 8px; }
  .mock .pg { height: 7px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .mock .pg i { display: block; height: 100%; width: 62%; }
  .mock .btn { display: inline-block; padding: 6px 18px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; }

  /* ───── 최종본. 윈터 팝 (5 네오브루탈 + 8 카툰 + 겨울) ───── */
  .tf { padding: 14px; border: 2px dashed #888; border-radius: 12px; }
  .tf > h2 { color: #ffd43d; }
  .tf .mock { font-family: 'Noto Sans KR', sans-serif; background-color: #e6f0f8; background-image: radial-gradient(circle at 12% 18%, #fff 0 2px, transparent 3px), radial-gradient(circle at 78% 9%, #fff 0 1.5px, transparent 2.5px), radial-gradient(circle at 45% 62%, #fff 0 1.5px, transparent 2.5px), radial-gradient(circle at 90% 80%, #fff 0 2px, transparent 3px); background-size: 380px 380px; color: #243b53; border: 3px solid #243b53; border-radius: 16px; }
  .tf .bar { background: #fff; border-bottom: 3px solid #243b53; border-radius: 13px 13px 0 0; }
  .tf .bar .title { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 17px; }
  .tf .gold { background: #ffe9b8; border: 2.5px solid #243b53; border-radius: 999px; padding: 2px 12px; font-weight: 700; box-shadow: 3px 3px 0 rgba(36,59,83,0.85); }
  .tf .hp { background: #ffdcd9; border: 2.5px solid #243b53; border-radius: 999px; padding: 2px 12px; font-weight: 700; box-shadow: 3px 3px 0 rgba(36,59,83,0.85); }
  .tf nav { background: #fff; border-right: 3px solid #243b53; }
  .tf nav .nv { font-family: 'Jua', sans-serif; border: 2.5px solid transparent; border-radius: 12px; color: #7b91a6; }
  .tf nav .nv.sel { background: #d6effc; border-color: #243b53; color: #243b53; box-shadow: 3px 3px 0 rgba(36,59,83,0.85); }
  .tf .card { background: #fff; border: 3px solid #243b53; border-radius: 16px; box-shadow: 4px 4px 0 rgba(36,59,83,0.9); }
  .tf .card.active { background: #effbe9; border-color: #338739; box-shadow: 4px 4px 0 #338739; }
  .tf .nm { font-family: 'Jua', sans-serif; font-weight: 400; font-size: 15px; }
  .tf .mt { color: #7b91a6; }
  .tf .pg { background: #dceaf4; border: 2px solid #243b53; border-radius: 999px; height: 10px; }
  .tf .pg i { background: linear-gradient(90deg, #6ed06a, #a4e88f); }
  .tf .btn { font-family: 'Jua', sans-serif; background: #ff8a3d; color: #fff; border: 2.5px solid #243b53; border-radius: 12px; box-shadow: 0 4px 0 #243b53; }
  .tf .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #243b53; }
  .tf .card.locked { opacity: 0.55; box-shadow: none; background: #f0f4f8; }
  .tf .card.locked .btn { background: #c3d2de; color: #6f8294; border-color: #8aa0b2; box-shadow: 0 4px 0 #8aa0b2; }

  /* ───── 1. 레트로 픽셀 RPG ───── */
  .t1 .mock { font-family: 'Galmuri11', monospace; background: #10101a; color: #e8e8e8; border: 4px solid #e8e8e8; border-radius: 0; box-shadow: 8px 8px 0 #000; }
  .t1 .bar { background: #1b1b2b; border-bottom: 4px solid #e8e8e8; }
  .t1 .bar .title { color: #7ec8ff; text-shadow: 2px 2px 0 #000; }
  .t1 .gold { color: #ffd23e; } .t1 .hp { color: #ff6b6b; }
  .t1 nav { border-right: 4px solid #e8e8e8; background: #1b1b2b; }
  .t1 nav .nv.sel { background: #7ec8ff; color: #10101a; }
  .t1 .card { background: #1b1b2b; border: 3px solid #e8e8e8; box-shadow: 4px 4px 0 #000; }
  .t1 .pg { background: #000; border: 2px solid #e8e8e8; }
  .t1 .pg i { background: repeating-linear-gradient(90deg, #5fe07a 0 8px, #2f8f46 8px 10px); }
  .t1 .btn { background: #ffd23e; color: #10101a; border: 3px solid #e8e8e8; box-shadow: 3px 3px 0 #000; }
  .t1 .card.locked { opacity: 0.45; }

  /* ───── 2. 겨울 대장간 ───── */
  .t2 .mock { font-family: 'IBM Plex Sans KR', sans-serif; background: #0d161f; color: #cfe2ee; border: 1px solid #2c4256; }
  .t2 .bar { background: linear-gradient(180deg, #18283a, #101c29); border-bottom: 2px solid #3d5870; }
  .t2 .bar .title { font-family: 'Hahmlet', serif; color: #9fd5ff; letter-spacing: 1px; }
  .t2 .gold { color: #ffb259; } .t2 .hp { color: #ff8a6b; }
  .t2 nav { background: #101c29; border-right: 1px solid #2c4256; }
  .t2 nav .nv { border-left: 3px solid transparent; color: #8fa9bd; }
  .t2 nav .nv.sel { border-left-color: #ff7a3d; color: #e8f4ff; background: #18283a; }
  .t2 .card { background: linear-gradient(180deg, #16242f, #111c26); border: 1px solid #34506a; border-top-color: #4a6f8f; border-radius: 4px; }
  .t2 .pg { background: #0a121a; border-radius: 2px; }
  .t2 .pg i { background: linear-gradient(90deg, #ff7a3d, #ffb259); box-shadow: 0 0 8px #ff7a3d88; }
  .t2 .btn { background: linear-gradient(180deg, #ff8a4d, #e05f1f); color: #fff; border-radius: 3px; }
  .t2 .card.locked { opacity: 0.4; filter: saturate(0.3); }

  /* ───── 3. 양피지 판타지 ───── */
  .t3 .mock { font-family: 'Gowun Batang', serif; background: #f3e9d2; color: #43321f; border: 2px solid #9c7b4f; }
  .t3 .bar { background: #5d4630; color: #f3e9d2; }
  .t3 .bar .title { color: #ffd9a0; }
  .t3 .gold { color: #ffcf70; } .t3 .hp { color: #ff9d8a; }
  .t3 nav { background: #e7d8b8; border-right: 2px solid #c9af83; }
  .t3 nav .nv { color: #6b543a; }
  .t3 nav .nv.sel { background: #5d4630; color: #f3e9d2; border-radius: 3px; }
  .t3 .card { background: #faf3e1; border: 1px solid #c9af83; box-shadow: 2px 3px 0 #d8c49d; border-radius: 3px; }
  .t3 .mt { color: #8a6f4d; }
  .t3 .pg { background: #e0d0ac; border: 1px solid #c9af83; }
  .t3 .pg i { background: #7a9b4e; }
  .t3 .btn { background: #8e2f1e; color: #f9ecd8; border-radius: 3px; }
  .t3 .card.locked { opacity: 0.55; }

  /* ───── 4. 미니멀 모노 ───── */
  .t4 .mock { font-family: 'IBM Plex Sans KR', sans-serif; background: #fff; color: #16181c; border: 1px solid #e3e4e8; }
  .t4 .bar { border-bottom: 1px solid #e3e4e8; }
  .t4 .bar .title { font-weight: 600; }
  .t4 .gold, .t4 .hp { color: #5f6470; font-size: 13px; }
  .t4 nav { border-right: 1px solid #e3e4e8; }
  .t4 nav .nv { color: #5f6470; border-radius: 6px; }
  .t4 nav .nv.sel { background: #f1f2f5; color: #16181c; font-weight: 600; }
  .t4 .card { border: 1px solid #e3e4e8; border-radius: 10px; }
  .t4 .pg { background: #eef0f3; border-radius: 4px; }
  .t4 .pg i { background: #3b66f5; border-radius: 4px; }
  .t4 .btn { background: #16181c; color: #fff; border-radius: 7px; }
  .t4 .card.locked { color: #b9bcc4; }

  /* ───── 5. 네오 브루탈리즘 ───── */
  .t5 .mock { font-family: 'Noto Sans KR', sans-serif; background: #fdf3e7; color: #111; border: 3px solid #111; border-radius: 0; box-shadow: 10px 10px 0 #111; }
  .t5 .bar { background: #ffd43d; border-bottom: 3px solid #111; }
  .t5 .bar .title { font-family: 'Black Han Sans', sans-serif; font-size: 18px; letter-spacing: 1px; }
  .t5 .gold { background: #fff; border: 2px solid #111; padding: 1px 8px; box-shadow: 3px 3px 0 #111; font-weight: 700; }
  .t5 .hp { background: #ff7a9c; border: 2px solid #111; padding: 1px 8px; box-shadow: 3px 3px 0 #111; font-weight: 700; }
  .t5 nav { border-right: 3px solid #111; background: #b7f0e0; }
  .t5 nav .nv { font-weight: 700; }
  .t5 nav .nv.sel { background: #111; color: #ffd43d; }
  .t5 .card { background: #fff; border: 3px solid #111; box-shadow: 5px 5px 0 #111; }
  .t5 .pg { background: #fff; border: 2px solid #111; }
  .t5 .pg i { background: repeating-linear-gradient(135deg, #4ad66d 0 10px, #111 10px 12px); }
  .t5 .btn { background: #ff5d3a; color: #fff; border: 3px solid #111; box-shadow: 4px 4px 0 #111; }
  .t5 .card.locked { background: #e5e0d6; opacity: 0.8; }

  /* ───── 6. 프로스트 글래스 ───── */
  .t6 .mock { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg, #0c1f3f 0%, #14365e 45%, #2a2553 100%); color: #eaf4ff; border: 1px solid rgba(255,255,255,0.18); }
  .t6 .bar { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.14); }
  .t6 .bar .title { color: #bfe3ff; text-shadow: 0 0 14px #6db9ff; }
  .t6 .gold { color: #ffd98a; } .t6 .hp { color: #ffa6a6; }
  .t6 nav { background: rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.12); }
  .t6 nav .nv { color: #b7cfe4; border-radius: 8px; }
  .t6 nav .nv.sel { background: rgba(255,255,255,0.16); color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25); }
  .t6 .card { background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; backdrop-filter: blur(10px); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .t6 .pg { background: rgba(0,0,0,0.35); border-radius: 6px; }
  .t6 .pg i { background: linear-gradient(90deg, #6db9ff, #b48fff); box-shadow: 0 0 10px #6db9ffcc; border-radius: 6px; }
  .t6 .btn { background: rgba(255,255,255,0.92); color: #14365e; border-radius: 9px; }
  .t6 .card.locked { opacity: 0.45; }

  /* ───── 7. 다크 판타지 ───── */
  .t7 .mock { font-family: 'Song Myung', serif; background: radial-gradient(ellipse at 50% 0%, #1a1418 0%, #0b0a0c 70%); color: #cbbfa8; border: 1px solid #3a2f2a; border-radius: 0; }
  .t7 .bar { background: #120e10; border-bottom: 1px solid #5c4a35; }
  .t7 .bar .title { color: #c9a86a; letter-spacing: 3px; }
  .t7 .gold { color: #c9a86a; } .t7 .hp { color: #a83246; }
  .t7 nav { background: #0e0c0e; border-right: 1px solid #3a2f2a; }
  .t7 nav .nv { color: #7d7264; }
  .t7 nav .nv.sel { color: #e7d9bb; border-left: 2px solid #a83246; background: linear-gradient(90deg, #2a1820, transparent); }
  .t7 .card { background: #141113; border: 1px solid #4a3c30; box-shadow: inset 0 0 24px rgba(0,0,0,0.7); }
  .t7 .nm { color: #e7d9bb; }
  .t7 .pg { background: #000; border: 1px solid #4a3c30; }
  .t7 .pg i { background: linear-gradient(90deg, #6e1f2e, #a83246); }
  .t7 .btn { background: transparent; color: #c9a86a; border: 1px solid #c9a86a; letter-spacing: 2px; }
  .t7 .card.locked { opacity: 0.35; }

  /* ───── 8. 캐주얼 카툰 ───── */
  .t8 .mock { font-family: 'Jua', sans-serif; background: #fff8ec; color: #5b4a3f; border: none; border-radius: 22px; box-shadow: 0 10px 0 #e8d9c0; }
  .t8 .bar { background: #ffd56b; border-radius: 22px 22px 0 0; }
  .t8 .bar .title { color: #7a5520; font-size: 18px; }
  .t8 .gold { background: #fff; border-radius: 999px; padding: 2px 12px; color: #d98a00; box-shadow: 0 3px 0 #e3c98f; }
  .t8 .hp { background: #fff; border-radius: 999px; padding: 2px 12px; color: #ef6461; box-shadow: 0 3px 0 #e3c98f; }
  .t8 nav { background: #ffefd2; }
  .t8 nav .nv { border-radius: 14px; color: #9a7d5e; }
  .t8 nav .nv.sel { background: #6cc24a; color: #fff; box-shadow: 0 3px 0 #4e9433; }
  .t8 .card { background: #fff; border-radius: 18px; box-shadow: 0 5px 0 #e8d9c0; }
  .t8 .ic { font-size: 32px; }
  .t8 .pg { background: #f0e4cd; border-radius: 999px; height: 10px; }
  .t8 .pg i { background: linear-gradient(180deg, #8ee06a, #5cb83e); border-radius: 999px; }
  .t8 .btn { background: #ff9e3d; color: #fff; border-radius: 999px; box-shadow: 0 4px 0 #d97a1b; padding: 7px 22px; }
  .t8 .card.locked { opacity: 0.55; }

  /* ───── 9. 터미널 CRT ───── */
  .t9 .mock { font-family: 'Galmuri9', 'Courier New', monospace; background: #04130a; color: #4ade80; border: 2px solid #14532d; border-radius: 6px; position: relative; }
  .t9 .mock::after { content: ''; position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0 1px, transparent 1px 3px); }
  .t9 .bar { border-bottom: 1px dashed #14532d; }
  .t9 .bar .title { color: #86efac; text-shadow: 0 0 8px #22c55e; }
  .t9 .bar .title::after { content: '_'; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .t9 .gold { color: #fde047; } .t9 .hp { color: #f87171; }
  .t9 nav { border-right: 1px dashed #14532d; }
  .t9 nav .nv::before { content: '> '; opacity: 0; }
  .t9 nav .nv.sel::before { opacity: 1; }
  .t9 nav .nv.sel { color: #bbf7d0; text-shadow: 0 0 6px #22c55e; }
  .t9 .card { border: 1px solid #166534; background: rgba(34,197,94,0.05); }
  .t9 .pg { background: #021007; border: 1px solid #166534; }
  .t9 .pg i { background: repeating-linear-gradient(90deg, #22c55e 0 6px, transparent 6px 9px); }
  .t9 .btn { background: transparent; border: 1px solid #4ade80; color: #4ade80; }
  .t9 .card.locked { opacity: 0.4; }

  /* ───── 10. 잉크 프린트 ───── */
  .t10 .mock { font-family: 'Noto Serif KR', serif; background: #efe8da; color: #1d1a16; border: 2px solid #1d1a16; border-radius: 0; }
  .t10 .bar { border-bottom: 3px double #1d1a16; }
  .t10 .bar .title { font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
  .t10 .gold, .t10 .hp { font-size: 12px; letter-spacing: 1px; }
  .t10 .hp { color: #9c2b23; }
  .t10 nav { border-right: 1px solid #1d1a16; }
  .t10 nav .nv { font-size: 12.5px; letter-spacing: 1px; border-bottom: 1px dotted #b9ad97; }
  .t10 nav .nv.sel { font-weight: 700; color: #9c2b23; }
  .t10 .card { background: #f5efe2; border: 1px solid #1d1a16; box-shadow: 3px 3px 0 rgba(29,26,22,0.25); }
  .t10 .mt { font-style: italic; }
  .t10 .pg { background: #ddd3bd; border: 1px solid #1d1a16; }
  .t10 .pg i { background: repeating-linear-gradient(45deg, #1d1a16 0 4px, #efe8da 4px 6px); }
  .t10 .btn { background: #1d1a16; color: #efe8da; letter-spacing: 3px; border-radius: 0; }
  .t10 .card.locked { opacity: 0.5; }
</style>
</head>
<body>
  <div class="intro">
    <h1>Winterforge — 디자인 시안</h1>
    <p>같은 게임 화면(상단 바 · 사이드바 · 액션 카드 3장)을 10가지 아트 디렉션으로 입힌 뒤,
    <b>5번 + 8번 조합에 겨울 팔레트를 더한 "윈터 팝"이 최종 선정</b>되어 게임에 적용됐습니다 (맨 위).
    이 페이지는 선정 과정 기록용입니다.</p>
  </div>

  <script>
    const themes = [
      ['tf', '★ 최종본 — 윈터 팝', '5번의 두꺼운 잉크 테두리·오프셋 섀도 + 8번의 둥근 모서리·3D 버튼 + 눈/얼음 팔레트. ' +
        '테두리는 검정 대신 겨울 남색(#243b53), 배경은 눈송이 흩날리는 얼음 하늘, 주요 버튼은 화로의 잉걸불 주황(#ff8a3d)'],
      ['t1', '1. 레트로 픽셀 RPG', '한글 픽셀 폰트 + 각진 테두리 + 하드 섀도. 고전 게임기 느낌'],
      ['t2', '2. 겨울 대장간', '게임 이름 그대로 — 얼음 강철 팔레트에 화로의 잉걸불 주황 포인트'],
      ['t3', '3. 양피지 판타지', '라이트 테마. 양피지와 잉크, 옛날 모험 일지 느낌'],
      ['t4', '4. 미니멀 모노', '흰 배경, 가는 선, 단일 파랑 포인트. 도구 같은 담백함'],
      ['t5', '5. 네오 브루탈리즘', '두꺼운 검정 테두리 + 오프셋 섀도 + 쨍한 원색 블록 → 최종본의 구조 베이스'],
      ['t6', '6. 프로스트 글래스', '겨울 밤하늘 그라데이션 위 반투명 유리 카드와 빛 번짐'],
      ['t7', '7. 다크 판타지', '검정과 핏빛, 명조 세리프, 금속 음각. 그림다크 무드'],
      ['t8', '8. 캐주얼 카툰', '둥글둥글 + 사탕 색 + 통통 튀는 입체 버튼. 모바일 게임 감성 → 최종본의 질감 베이스'],
      ['t9', '9. 터미널 CRT', '인광 초록 모노스페이스 + 스캔라인. 해커 콘솔'],
      ['t10', '10. 잉크 프린트', '신문 활판 인쇄 — 크림지에 검정 잉크, 빨강 도장 포인트'],
    ];
    document.body.insertAdjacentHTML('beforeend', themes.map(([cls, name, desc]) => `
